name: Java CI Automation

# Kích hoạt khi có sự kiện push và pull_request
on: [push, pull_request]

jobs:
  build:
    # runs-on: ubuntu-latest # Cấu hình máy ảo thực thi
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        # Định nghĩa 3 hệ điều hành sẽ chạy song song
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cài đặt JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # Thực thi vòng đời Maven, đảm bảo test và package chạy thành công
      #- name: Build và Test với Maven
      # run: mvn clean package

      # Sửa lệnh package thành verify để Maven chạy đến phase kiểm tra JaCoCo
      - name: Build, Test và Check Coverage với Maven
        run: mvn clean verify

      # Triển khai action upload-artifact để lưu giữ tệp .jar
      - name: Lưu trữ file JAR
        uses: actions/upload-artifact@v4
        with:
          name: bank-system-executable
          path: target/*.jar

      # Tải báo cáo HTML của JaCoCo lên GitHub
      - name: Lưu trữ báo cáo JaCoCo Code Coverage
        uses: actions/upload-artifact@v4
        if: always() # Luôn lấy báo cáo về kể cả khi bị Đỏ (fail do ko đủ 80%)
        with:
          name: jacoco-report-${{ matrix.os }}
          path: target/site/jacoco/